# ✅ 1. HTTP(80) → HTTPS 리디렉션
server {
    listen 80;
    server_name simpolor.com www.simpolor.com;
    return 301 https://$host$request_uri;
}

# ✅ 2. 프론트엔드 (simpolor.com / www.simpolor.com → localhost:8080)
server {
    listen 443 ssl;
    server_name simpolor.com www.simpolor.com;

    ssl_certificate /etc/letsencrypt/live/simpolor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simpolor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vue/React SPA (History mode)
        # try_files $uri $uri/ /index.html;
    }
}